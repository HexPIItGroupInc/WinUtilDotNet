name: CI
# Runs on the public GitHub mirror (GitHub-hosted runners). The whole point:
# show the engine building and the tests passing against upstream winutil's
# own catalog JSON, right there on GitHub with a green check.
#
# Guarded to GitHub only — this repo's source of truth is a Gitea instance that
# also reads .github/workflows; the `if` keeps it from double-running there
# (Gitea's own pipeline lives in .gitea/workflows).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Catalog-as-contract: the tests validate against a fresh clone of the
      # real, unmodified upstream catalogs on every run.
      - name: Fetch upstream winutil catalogs
        run: git clone --depth 1 https://github.com/ChrisTitusTech/winutil.git "${RUNNER_TEMP}/winutil"

      - name: Build (warnings are errors)
        run: dotnet build --configuration Release

      - name: Unit tests + upstream catalog tests
        run: dotnet test --configuration Release --no-build
        env:
          WINUTIL_REPO: ${{ runner.temp }}/winutil

      - name: PowerShell-free coverage metric
        run: >
          dotnet run --project src/WinUtil.Cli --configuration Release --no-build --framework net10.0 --
          coverage --catalog "${RUNNER_TEMP}/winutil/config/tweaks.json" --overlay native/overrides.json
