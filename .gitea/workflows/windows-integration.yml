name: Windows Integration
# Runs on the self-hosted Windows runner "win11-backup" (hecaton VM).
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  integration:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream winutil catalogs
        run: git clone --depth 1 https://github.com/ChrisTitusTech/winutil.git $env:RUNNER_TEMP\winutil

      - name: Build
        run: dotnet build --configuration Release

      - name: Validate catalog end-to-end on Windows
        run: dotnet run --project src/WinUtil.Cli --configuration Release --no-build -- validate --catalog $env:RUNNER_TEMP\winutil\config\tweaks.json

      # TODO(Phase 1): apply/detect/undo integration suite against the live
      # registry, with host-side snapshot revert bracketing the run.
