name: Windows Integration
# Runs on the self-hosted Windows runner "win11-backup" (hecaton VM).
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  integration:
    runs-on: [self-hosted, windows]
    steps:
      # Plain-git checkout: host runner has MinGit but no node, so
      # github-hosted actions (checkout/setup-*) are off the menu by design.
      - name: Checkout
        run: |
          git init -q .
          git config remote.origin.url ${{ github.server_url }}/${{ github.repository }}.git
          git fetch -q --depth 1 origin ${{ github.sha }}
          git checkout -q -f FETCH_HEAD

      - name: Fetch upstream winutil catalogs
        run: |
          if (Test-Path "$env:RUNNER_TEMP\winutil") { Remove-Item -Recurse -Force "$env:RUNNER_TEMP\winutil" }
          git clone -q --depth 1 https://github.com/ChrisTitusTech/winutil.git "$env:RUNNER_TEMP\winutil"

      - name: Build
        run: dotnet build --configuration Release

      - name: Validate catalog end-to-end on Windows
        run: dotnet run --project src/WinUtil.Cli --configuration Release --no-build --framework net10.0-windows10.0.19041.0 -- validate --catalog "$env:RUNNER_TEMP\winutil\config\tweaks.json"

      - name: Integration suite (real registry, no PowerShell spawned)
        run: dotnet test tests/WinUtil.Integration.Tests --configuration Release --no-build
        env:
          RUN_WINDOWS_INTEGRATION: "1"

      - name: Detect real state of every catalog tweak on this VM
        run: dotnet run --project src/WinUtil.Cli --configuration Release --no-build --framework net10.0-windows10.0.19041.0 -- detect --all --catalog "$env:RUNNER_TEMP\winutil\config\tweaks.json"

      - name: Debloat dry-run over the real appx.json (read-only)
        run: dotnet run --project src/WinUtil.Cli --configuration Release --no-build --framework net10.0-windows10.0.19041.0 -- debloat --appx "$env:RUNNER_TEMP\winutil\config\appx.json" --dry-run
